name: Update Leaderboard Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: 🟢 Node.js 설정
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 의존성 설치
      run: npm ci --legacy-peer-deps
      
    - name: 🔄 리더보드 데이터 생성
      env:
        VITE_AIRTABLE_API_KEY: ${{ secrets.VITE_AIRTABLE_API_KEY }}
        VITE_BASE_ID: ${{ secrets.VITE_BASE_ID }}
        VITE_TABLE_NAME: ${{ secrets.VITE_TABLE_NAME }}
      run: node scripts/generate-leaderboard.js
      
    - name: 🏗️ 프로젝트 빌드
      run: npm run build
      
    - name: 🚀 Vercel 배포 (빌드 결과물 직접 배포)
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        npm install -g vercel
        vercel build --prod --token $VERCEL_TOKEN --yes
        vercel deploy --prebuilt --prod --token $VERCEL_TOKEN --yes

    - name: 💾 생성된 데이터를 Git에 커밋
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add public/data/ public/assets/thumbnails/ -f
        git diff --staged --quiet && echo "✅ 변경사항 없음" || (git commit -m "chore: update leaderboard data [skip ci]" && git push)

    - name: ✅ 완료 알림
      run: |
        echo "🎉 리더보드 자동 업데이트 완료!"
        echo "📅 업데이트 시간: $(date)"
        echo "🔗 사이트: https://reels-leaderboard.vercel.app"
