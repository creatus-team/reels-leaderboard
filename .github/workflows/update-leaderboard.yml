name: Update Leaderboard Data
on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 날짜 계산을 위해 전체 히스토리 가져오기
      
    - name: 🟢 Node.js 설정
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 의존성 설치
      run: npm ci --legacy-peer-deps
      
    - name: 🔄 리더보드 데이터 생성
      env:
        VITE_AIRTABLE_API_KEY: ${{ secrets.VITE_AIRTABLE_API_KEY }}
        VITE_BASE_ID: ${{ secrets.VITE_BASE_ID }}
        VITE_TABLE_NAME: ${{ secrets.VITE_TABLE_NAME }}
      run: node scripts/generate-leaderboard.js
      
    - name: 🏗️ 프로젝트 빌드
      run: npm run build
      
    - name: 🚀 Vercel 배포
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        npm install -g vercel
        vercel --token $VERCEL_TOKEN --prod --yes
    - name: 💓 생존 신고 (50일마다)
      run: |
        LAST_COMMIT=$(git log -1 --format=%ct)
        NOW=$(date +%s)
        DAYS_DIFF=$(( ($NOW - $LAST_COMMIT) / 86400 ))
        
        echo "📅 마지막 커밋으로부터 ${DAYS_DIFF}일 지남"
        
        if [ $DAYS_DIFF -gt 50 ]; then
          echo "⚠️ 50일 경과! 생존 신고 커밋 생성..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep workflow alive [skip ci]"
          git push
        else
          echo "✅ 아직 50일 안 지남. 패스!"
        fi
        
    - name: ✅ 완료 알림
      run: |
        echo "🎉 리더보드 자동 업데이트 완료!"
        echo "📅 업데이트 시간: $(date)"
        echo "🔗 사이트: https://reels-leaderboard.vercel.app"
